name: Daily News Agent

on:
  workflow_dispatch:
  schedule:
    # 22:00 UTC is 07:00 in Japan Standard Time.
    - cron: "0 22 * * *"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Generate daily digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          NEWS_AGENT_TIMEZONE: Asia/Tokyo
          NEWS_AGENT_LANGUAGES: ja,en
          TZ: Asia/Tokyo
        run: |
          set -euo pipefail
          TODAY=$(TZ=Asia/Tokyo date +%F)
          export TODAY
          echo "Expect report date: ${TODAY}"
          daily-news-agent | tee /tmp/daily-news-agent.log
          python - <<'PY'
          import os
          import pathlib
          today = os.environ["TODAY"]
          root = pathlib.Path("reports")
          missing = []
          for language in ("ja", "en"):
              if not (root / language / f"{today}.md").exists():
                  missing.append(f"{language}/{today}.md")
          if missing:
              raise SystemExit(f"Missing report files: {', '.join(missing)}")
          print("Generated report files:")
          for language in ("ja", "en"):
              path = root / language / f"{today}.md"
              print(f"- {path}")
          PY

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-news-reports-${{ github.run_id }}
          path: reports
          if-no-files-found: error

      - name: Commit digest
        run: |
          if [ -z "$(git status --porcelain reports)" ]; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports
          git commit -m "Add daily news digest"
          git push
