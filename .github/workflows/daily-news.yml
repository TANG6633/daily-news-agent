name: Daily News Agent

on:
  workflow_dispatch:
  schedule:
    # 22:00 UTC is 07:00 in Japan Standard Time.
    - cron: "0 22 * * *"

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Generate daily digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          NEWS_AGENT_TIMEZONE: Asia/Tokyo
          NEWS_AGENT_LANGUAGES: zh,en
          NEWS_AGENT_EMAIL_TO: ${{ secrets.NEWS_AGENT_EMAIL_TO }}
          NEWS_AGENT_EMAIL_FROM: ${{ secrets.NEWS_AGENT_EMAIL_FROM }}
          NEWS_AGENT_EMAIL_SUBJECT: ${{ vars.NEWS_AGENT_EMAIL_SUBJECT || 'Daily News Digest / 每日新闻总结 - {date}' }}
          NEWS_AGENT_SMTP_HOST: ${{ secrets.NEWS_AGENT_SMTP_HOST }}
          NEWS_AGENT_SMTP_PORT: ${{ vars.NEWS_AGENT_SMTP_PORT || '587' }}
          NEWS_AGENT_SMTP_USERNAME: ${{ secrets.NEWS_AGENT_SMTP_USERNAME }}
          NEWS_AGENT_SMTP_PASSWORD: ${{ secrets.NEWS_AGENT_SMTP_PASSWORD }}
          NEWS_AGENT_SMTP_STARTTLS: ${{ vars.NEWS_AGENT_SMTP_STARTTLS || 'true' }}
        run: daily-news-agent --email

      - name: Commit digest
        run: |
          if [ -z "$(git status --porcelain reports)" ]; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports
          git commit -m "Add daily news digest"
          git push
